# .github/workflows/auto-pr.yml

name: 'Auto-Create Pull Request'

# 'extra' 브랜치로 푸시될 때만 실행
on:
  push:
    branches: [ extra ]
permissions:
  pull-requests: write  # PR을 생성(write)할 수 있는 권한
  contents: read      # 코드를 체크아웃(read)할 수 있는 권한
jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃 (커밋 메시지를 읽기 위해)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # 마지막 커밋 1개만 가져옴

      # 2. PR이 이미 존재하는지 확인
      - name: 'Check if PR already exists'
        id: check_pr
        run: |
          # 'gh' CLI를 사용하여 'extra' -> 'main'으로의 열린 PR이 있는지 확인
          if gh pr list --head extra --base main --state open | grep -q .; then
            echo "Pull request already exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "No PR found. Creating a new one."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
             GH_TOKEN: ${{ secrets.GH_PAT }}

      # 3. PR 생성 (PR이 없을 때만 실행)
      - name: 'Create Pull Request'
        if: steps.check_pr.outputs.exists == 'false'
        id: create_pr # <-- 'id'를 추가
        run: |
          LATEST_COMMIT_MSG=$(git log -1 --pretty=%s)
          
          # PR을 생성하고, 생성된 PR의 URL을 'pr_url'이라는 출력 변수에 저장합니다.
          PR_URL=$(gh pr create \
            --base main \
            --head extra \
            --title "$LATEST_COMMIT_MSG" \
            --body "자동화된 PR입니다. CI 테스트가 완료되면 자동 병합됩니다.")
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
