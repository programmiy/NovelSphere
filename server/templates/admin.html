<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>번역 관리</title>
    <link rel="stylesheet" href="/static/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <a href="/" class="btn btn-outline" style="position: absolute; top: 24px; left: 24px;">&larr; 서재로 돌아가기</a>
            <button onclick="window.location.href='/db_editor';" class="btn btn-outline" style="position: absolute; top: 24px; right: 24px; z-index: 9999;">DB 편집기 &rarr;</button>
            <h1>번역 기록</h1>
            <p>저장된 모든 번역을 탐색하고 관리합니다.</p>
        </header>

        <div id="status-message" style="position: absolute; top: 24px; right: 24px; background-color: var(--primary-color); color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; display: none; z-index: 100;"></div>
        <div id="progress-container" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: var(--primary-color); color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 1000;"></div>

        <div class="master-controls">
            <div class="control-bar-wrapper">
                <div class="control-group">
                    <input type="text" class="form-input search-box" id="searchBox" placeholder="검색...">
                    <select id="folderFilterDropdown" class="form-select">
                        <option value="">모든 폴더</option>
                    </select>
                    <button id="openGlobalFindReplaceBtn" class="btn btn-outline">전체 찾아 바꾸기</button>
                    <button id="findEmptyBtn" class="btn btn-outline">이상번역 찾기</button>
                    <a href="/logs" class="btn btn-outline">로그 뷰어</a>
                    <!-- <button id="fetchAllTitlesBtn" class="btn btn-secondary">모든 제목 가져오기</button> -->
                </div>
                <div class="control-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="autoStartCheckbox">
                        <span class="checkmark"></span>
                        컴퓨터 시작 시 자동 실행
                    </label>
                    <label class="checkbox-container" style="display: none;">
                        <span class="checkmark"></span>
                        드래그앤 드롭 순서 변경
                    </label>
                </div>
                <div class="control-group right">
                    <button class="btn btn-primary" id="exportPdfBtn">PDF로 내보내기</button>
                    <button class="btn btn-outline" id="exportJsonBtn">JSON으로 내보내기</button>
                    <button class="btn btn-outline" id="clearCacheBtn">전체 제목 캐시 초기화</button>
                    <button class="btn btn-outline" id="darkModeToggle">
                        <span class="material-icons">dark_mode</span>
                    </button>
                    <button class="btn btn-danger" id="clearAllBtn">전체 삭제</button>
                </div>
            </div>
            <div class="folder-management-wrapper">
                 <input type="text" id="newFolderNameInput" placeholder="새 폴더 이름" class="form-input" style="flex: 1; min-width: 150px;">
                 <button id="createFolderButton" class="btn btn-primary">폴더 생성</button>
            </div>
            <div class="stats-wrapper">
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">총 번역</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="todayCount">0</div>
                    <div class="stat-label">오늘 번역</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="avgLength">0</div>
                    <div class="stat-label">평균 길이</div>
                </div>
            </div>
        </div>
            
                <div id="errorLogContainer" class="list-group" style="display: none; margin-bottom: 16px;">
                    <div class="list-group-header" style="background-color: #ffe3e3;">
                        <span class="list-group-toggle collapsed">▶</span>
                        <h3 class="list-group-title" style="color: var(--danger-color);">API 오류 로그</h3>
                        <div class="list-group-actions">
                            <button id="deleteErrorLogBtn" class="btn btn-danger">로그 삭제</button>
                        </div>
                    </div>
                    <div class="list-group-content collapsed" style="padding: 16px;">
                        <p>번역 중 API에서 오류가 발생한 기록입니다. API 키, 사용량, 또는 스크립트의 상태를 확인해주세요.</p>
                        <div id="errorLogContent"></div>
                    </div>
                </div>
            
                <div class="control-group" id="bulk-actions" style="display: none; width: 100%; background-color: var(--primary-color); color: white; padding: 12px 16px; border-radius: 8px; margin-top: 16px; align-items: center; justify-content: space-between;">
                       <span id="selection-count" style="font-weight: 500;"></span>
                       <div style="display: flex; gap: 10px; align-items: center;">
                                               <select id="moveSelectedToFolderDropdown" class="form-select" style="min-width: 150px; background-color: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); color: white;" disabled>
                                                   <option value="">폴더로 이동...</option>
                                               </select>
                                               <button class="btn btn-danger" id="deleteSelectedBtn" style="background-color: #c92a2a; border-color: #c92a2a;" disabled>선택 삭제</button>                                     </div>
                </div>
        <div id="folderList" style="display: none; background: var(--card-bg); padding: 16px; border-radius: var(--border-radius); margin-bottom: 24px; box-shadow: var(--shadow); border: 1px solid var(--border-color);">
        </div>

        <div id="loading-skeleton" style="display: none;">
            <div class="list-group skeleton-group">
                <div class="list-group-header skeleton-header"></div>
                <div class="history-item skeleton-item"></div>
                <div class="history-item skeleton-item"></div>
            </div>
            <div class="list-group skeleton-group">
                <div class="list-group-header skeleton-header"></div>
                <div class="history-item skeleton-item"></div>
            </div>
        </div>
        <div id="history-container">
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <h2>기록이 없습니다</h2>
            <p>웹페이지에서 일본어를 번역하면 여기에 기록이 저장됩니다.</p>
        </div>
    </div>

    <!-- Modals -->
    <div class="edit-modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">번역 수정</div>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">원본 텍스트</label>
                <textarea class="form-textarea" id="editOriginal" readonly></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">번역 텍스트</label>
                <textarea class="form-textarea" id="editTranslated"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelEdit">취소</button>
                <button class="btn btn-primary" id="saveEdit">저장</button>
            </div>
        </div>
    </div>

    <div class="edit-modal" id="findReplaceModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <div class="modal-title">전체 찾아 바꾸기</div>
                <button class="close-btn" id="closeFindReplaceModal">×</button>
            </div>

            <div class="form-group">
                <label class="form-label" for="findText">찾을 내용</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="text" class="form-input" style="width: 100%" id="findText">
                    <span id="findCount" style="font-size: 14px; color: var(--text-muted); white-space: nowrap;">(0개)</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="replaceText">바꿀 내용</label>
                <input type="text" class="form-input" style="width: 100%" id="replaceText">
            </div>

            <hr style="border-color: var(--border-color); margin: 16px 0;">

            <div class="form-group">
                <label class="form-label" for="conditionText">조건: 원문에 다음 단어 포함 시</label>
                <input type="text" class="form-input" style="width: 100%" id="conditionText" placeholder="예: '소설' (비워두면 모든 항목 대상)">
            </div>

            <div class="form-group">
                <label class="form-label" for="folderScope">범위</label>
                <select id="folderScope" class="form-select" style="width: 100%;">
                    <option value="__all__">모든 폴더</option>
                </select>
            </div>

            <div class="form-group" style="display: flex; gap: 20px; align-items: center; margin-top: 16px;">
                <label class="checkbox-container" style="font-weight: normal;">
                    <input type="checkbox" id="useRegex">
                    <span class="checkmark"></span>
                    정규식 사용
                </label>
                <label class="checkbox-container" style="font-weight: normal;">
                    <input type="checkbox" id="caseSensitive">
                    <span class="checkmark"></span>
                    대소문자 구분
                </label>
            </div>

            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelFindReplace">취소</button>
                <button class="btn btn-primary" id="executeFindReplace">실행</button>
            </div>
        </div>
    </div>

    <!-- <script type="module" src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.esm.js"></script> -->
    <script type="module" src="/static/admin.js?v=1.1"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
