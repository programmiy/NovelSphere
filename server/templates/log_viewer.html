<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANOVEL Log Viewer</title>
    <link rel="stylesheet" href="/static/log_viewer.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div class="container">
        <h1>서버 로그</h1>
        <div class="button-group">
            <button id="backToAdmin" onclick="location.href='/admin'">뒤로가기</button>
            <button id="refreshLogs">새로고침</button>
        </div>
        <pre id="logContent" class="log-output"></pre>
    </div>
    <script src="/static/log_viewer.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
